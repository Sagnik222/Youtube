name: YouTube Autopilot Cron

on:
  schedule:
    # Run once daily at 09:00 AM UTC
    - cron: '0 9 * * *'
  # Allow manual trigger from the GitHub Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-automation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: package.json

      - name: Setup FFmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Run Autopilot Daemon Tick
        run: node daemon-once.js
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}

      - name: Commit & Push Daily Updates
        run: |
          git config --global user.name "RepurposeAI Autopilot"
          git config --global user.email "autopilot@repurpose.ai"
          git add database.json reports/ publications/
          if git diff --staged --quiet; then
            echo "No changes. Skipping."
          else
            git commit -m "Auto-update database [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi
